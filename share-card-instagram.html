<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmic Almanac — Share Card</title>
  <style>
    /* ── Variables ─────────────────────────────────── */
    :root {
      --bg:    #09080b;
      --gold:  #c4a55a;
      --t1:    rgba(255,252,248,0.93);
      --t2:    rgba(255,252,248,0.50);
      --t3:    rgba(255,252,248,0.26);
      --glass-panel:
        linear-gradient(180deg, rgba(255,255,255,.095), rgba(255,255,255,.03)),
        linear-gradient(135deg, rgba(196,165,90,.11), transparent 38%, rgba(255,255,255,.045));
      --glass-chip:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.028)),
        linear-gradient(135deg, rgba(196,165,90,.06), transparent 42%, rgba(255,255,255,.028));
      --glass-border: rgba(255,252,248,.096);
      --glass-inner:  rgba(255,255,255,.10);
      --glass-shadow-strong: 0 18px 46px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.10);
      --font-serif: "Iowan Old Style","Palatino Linotype","Book Antiqua","Baskerville","Times New Roman",serif;
      --font-ui: -apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",system-ui,sans-serif;
    }

    /* ── Reset + page ───────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #16141a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      font-family: var(--font-ui);
      padding: 32px 16px;
    }

    /* ── Card stage ─────────────────────────────────── */
    .stage {
      position: relative;
      width: 400px;
      height: 600px;
      flex-shrink: 0;
    }

    /* ── Card shell ─────────────────────────────────── */
    .card {
      position: relative;
      width: 400px;
      height: 600px;
      border-radius: 26px;
      overflow: hidden;
    }

    /* ── Background: deep space ─────────────────────── */
    .card-bg {
      position: absolute;
      inset: 0;
      border-radius: 26px;
      overflow: hidden;
      background: var(--bg);
    }

    .bg-depth {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 45% at 50% 115%, rgba(170,130,35,.07)  0%, transparent 55%),
        radial-gradient(ellipse 65% 40% at 50%  -8%, rgba(25,20,42,.50)    0%, transparent 55%),
        radial-gradient(ellipse 30% 70% at 0%   50%, rgba(18,14,30,.30)    0%, transparent 55%),
        radial-gradient(ellipse 30% 70% at 100% 50%, rgba(18,14,30,.30)    0%, transparent 55%);
    }

    .bg-stars {
      position: absolute; inset: 0;
      background-image:
        radial-gradient(1.2px 1.2px at  9%  17%, rgba(255,252,248,.42) 0%, transparent 100%),
        radial-gradient(1.6px 1.6px at 28%  63%, rgba(255,252,248,.32) 0%, transparent 100%),
        radial-gradient(1px   1px   at 43%   8%, rgba(255,252,248,.38) 0%, transparent 100%),
        radial-gradient(2px   2px   at 62%  27%, rgba(255,252,248,.48) 0%, transparent 100%),
        radial-gradient(1px   1px   at 80%  72%, rgba(255,252,248,.28) 0%, transparent 100%),
        radial-gradient(1.4px 1.4px at 17%  85%, rgba(255,252,248,.40) 0%, transparent 100%),
        radial-gradient(1px   1px   at 91%  14%, rgba(255,252,248,.25) 0%, transparent 100%),
        radial-gradient(1.8px 1.8px at 37%  78%, rgba(255,252,248,.52) 0%, transparent 100%),
        radial-gradient(1px   1px   at 71%  44%, rgba(255,252,248,.30) 0%, transparent 100%),
        radial-gradient(1.2px 1.2px at 54%  91%, rgba(255,252,248,.36) 0%, transparent 100%),
        radial-gradient(1px   1px   at 22%  35%, rgba(255,252,248,.22) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 68%  58%, rgba(255,252,248,.44) 0%, transparent 100%),
        radial-gradient(1px   1px   at 83%  32%, rgba(255,252,248,.20) 0%, transparent 100%),
        radial-gradient(1.3px 1.3px at 48%  52%, rgba(255,252,248,.18) 0%, transparent 100%),
        radial-gradient(1px   1px   at  5%  70%, rgba(255,252,248,.26) 0%, transparent 100%);
    }

    /* ── Glass surface ──────────────────────────────── */
    .card-glass {
      position: absolute;
      inset: 0;
      border-radius: 26px;
      background: var(--glass-panel);
      background-color: rgba(255,255,255,.07); /* html2canvas fallback */
      backdrop-filter: blur(30px) saturate(180%) brightness(1.08);
      -webkit-backdrop-filter: blur(30px) saturate(180%) brightness(1.08);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow-strong);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 48px 32px 38px;
      text-align: center;
    }

    /* ── Corner decorators ──────────────────────────── */
    .corner-tl, .corner-br {
      position: absolute;
      font-size: 10px;
      color: var(--gold);
      opacity: 0.30;
    }
    .corner-tl { top: 18px; left: 22px; }
    .corner-br { bottom: 18px; right: 22px; }

    /* ── Top section ────────────────────────────────── */
    .card-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .star-icon {
      font-size: 52px;
      color: var(--gold);
      filter: drop-shadow(0 0 18px rgba(196,165,90,.55)) drop-shadow(0 0 36px rgba(196,165,90,.22));
      line-height: 1;
      margin-bottom: 18px;
      display: block;
    }

    .app-title {
      font-family: var(--font-serif);
      font-size: 32px;
      font-weight: 700;
      letter-spacing: .02em;
      line-height: 1.1;
      background: linear-gradient(135deg, rgba(255,252,248,.96) 0%, #c4a55a 55%, rgba(255,232,180,.85) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .title-zh {
      font-family: var(--font-ui);
      font-size: 15px;
      font-weight: 400;
      color: var(--t2);
      letter-spacing: .12em;
    }

    /* ── Mid section ────────────────────────────────── */
    .card-mid {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      justify-content: center;
      padding: 0 6px;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.55;
      margin: 24px auto 22px;
    }

    .tagline-en {
      font-family: var(--font-serif);
      font-size: 14px;
      line-height: 1.68;
      color: var(--t2);
      font-style: italic;
      letter-spacing: .01em;
    }

    .tagline-zh {
      font-family: var(--font-ui);
      font-size: 12.5px;
      line-height: 1.7;
      color: var(--t3);
      margin-top: 10px;
      letter-spacing: .04em;
    }

    /* ── Bottom section ─────────────────────────────── */
    .card-bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .qr-wrapper {
      display: inline-flex;
      padding: 12px;
      border-radius: 18px;
      background: var(--glass-chip);
      background-color: rgba(255,255,255,.06); /* html2canvas fallback */
      border: 1px solid rgba(255,252,248,.096);
      box-shadow: 0 10px 26px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.07);
    }

    .qr-code {
      display: block;
      width: 140px;
      height: 140px;
      border-radius: 6px;
    }

    .qr-label {
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--t3);
      letter-spacing: .08em;
      margin-top: 14px;
    }

    .qr-url {
      font-family: var(--font-ui);
      font-size: 10px;
      color: rgba(255,252,248,.18);
      letter-spacing: .03em;
      margin-top: 5px;
    }

    /* ── Save button (outside card) ─────────────────── */
    .save-btn {
      background: linear-gradient(135deg, rgba(196,165,90,.22), rgba(196,165,90,.10));
      border: 1px solid rgba(196,165,90,.36);
      color: var(--t1);
      font-family: var(--font-ui);
      font-size: 13.5px;
      font-weight: 600;
      padding: 11px 28px;
      border-radius: 20px;
      cursor: pointer;
      letter-spacing: .02em;
      backdrop-filter: blur(10px);
      transition: background .2s, box-shadow .2s;
    }
    .save-btn:hover {
      background: linear-gradient(135deg, rgba(196,165,90,.34), rgba(196,165,90,.18));
      box-shadow: 0 0 18px rgba(196,165,90,.20);
    }
  </style>
</head>

  <button class="save-btn" onclick="saveCard()">↓ Save Card as PNG</button>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    function saveCard() {
      html2canvas(document.getElementById("card"), {
        scale: 2,
        backgroundColor: null,
        useCORS: true,
        logging: false
      }).then(canvas => {
        const a = document.createElement("a");
        a.download = "cosmic-almanac-instagram-share.png";
        a.href = canvas.toDataURL("image/png");
        a.click();
      });
    }
  </script>
