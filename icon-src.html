<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!--
    Source layout for the app icon (apple-touch-icon / manifest / favicon).
    Full-bleed, no transparency — platforms mask the corners.
    Render with headless Chrome at 2x, then downscale with sips:

      "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
        --headless --disable-gpu --hide-scrollbars --force-device-scale-factor=2 \
        --window-size=512,512 --screenshot=icon-2x.png "file://$PWD/icon-src.html"
      sips -z 512 512 icon-2x.png --out cosmic-daily-icon.png
      sips -z 192 192 icon-2x.png --out cosmic-daily-icon-192.png
      sips -z 64  64  icon-2x.png --out favicon.png

    Liquid-Glass intent (baked in, since a PWA PNG can't be composited by
    Icon Composer): full-bleed deep-space ground, one hero glass star with
    an inner glow ("lit from within"), a top-left specular highlight, a rim
    light, and a soft cast shadow for float/depth. Palette matches the app:
    gold #c4a55a on #09080b space, with a warm-gold aura + cool indigo sky.
  -->
  <title>Cosmic Almanac — App Icon</title>
  <style>
    html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#08070c}
    svg{display:block;width:100vw;height:100vh}
  </style>
</head>
<body>
  <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
    <defs>
      <!-- deep-space ground -->
      <radialGradient id="sky" cx="50%" cy="34%" r="82%">
        <stop offset="0%"  stop-color="#1a1630"/>
        <stop offset="42%" stop-color="#0e0b1a"/>
        <stop offset="100%" stop-color="#050409"/>
      </radialGradient>
      <!-- warm horizon glow low + behind star -->
      <radialGradient id="warm" cx="50%" cy="66%" r="60%">
        <stop offset="0%"  stop-color="rgba(196,165,90,0.26)"/>
        <stop offset="55%" stop-color="rgba(150,110,45,0.06)"/>
        <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
      </radialGradient>
      <!-- corner vignette -->
      <radialGradient id="vig" cx="50%" cy="50%" r="72%">
        <stop offset="60%" stop-color="rgba(0,0,0,0)"/>
        <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
      </radialGradient>
      <!-- aura halo behind the star -->
      <radialGradient id="halo" cx="50%" cy="50%" r="50%">
        <stop offset="0%"  stop-color="rgba(240,205,130,0.42)"/>
        <stop offset="46%" stop-color="rgba(220,175,95,0.14)"/>
        <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
      </radialGradient>
      <!-- star body: bright top-left -> gold -> deep -->
      <linearGradient id="body" x1="26%" y1="16%" x2="80%" y2="94%">
        <stop offset="0%"   stop-color="#fff7e2"/>
        <stop offset="30%"  stop-color="#f2d79c"/>
        <stop offset="62%"  stop-color="#d8ad5f"/>
        <stop offset="100%" stop-color="#a07a38"/>
      </linearGradient>
      <!-- inner "lit from within" core -->
      <radialGradient id="core" cx="44%" cy="40%" r="60%">
        <stop offset="0%"  stop-color="rgba(255,250,232,0.95)"/>
        <stop offset="34%" stop-color="rgba(250,225,165,0.55)"/>
        <stop offset="100%" stop-color="rgba(250,225,165,0)"/>
      </radialGradient>
      <linearGradient id="rim" x1="20%" y1="12%" x2="82%" y2="90%">
        <stop offset="0%"  stop-color="rgba(255,252,244,0.9)"/>
        <stop offset="40%" stop-color="rgba(255,252,244,0.12)"/>
        <stop offset="100%" stop-color="rgba(120,90,40,0.5)"/>
      </linearGradient>
      <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"  stop-color="rgba(255,255,255,0.10)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </linearGradient>

      <filter id="blurBig"  x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="18"/></filter>
      <filter id="blurMed"  x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="9"/></filter>
      <filter id="blurSpec" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="12"/></filter>

      <!-- hero star shape -->
      <path id="star" d="M256 96 Q292 220 416 256 Q292 292 256 416 Q220 292 96 256 Q220 220 256 96 Z"/>
      <clipPath id="starClip"><use href="#star"/></clipPath>
    </defs>

    <!-- ===== background ===== -->
    <rect width="512" height="512" fill="url(#sky)"/>
    <rect width="512" height="512" fill="url(#warm)"/>

    <!-- starfield -->
    <g fill="#fff8ee">
      <circle cx="78"  cy="96"  r="1.6" opacity=".55"/>
      <circle cx="132" cy="360" r="1.3" opacity=".40"/>
      <circle cx="420" cy="120" r="1.7" opacity=".50"/>
      <circle cx="446" cy="330" r="1.3" opacity=".42"/>
      <circle cx="96"  cy="250" r="1.1" opacity=".30"/>
      <circle cx="392" cy="416" r="1.4" opacity=".38"/>
      <circle cx="60"  cy="420" r="1.2" opacity=".34"/>
      <circle cx="300" cy="70"  r="1.2" opacity=".34"/>
      <circle cx="200" cy="440" r="1.3" opacity=".30"/>
    </g>

    <!-- aura halo -->
    <circle cx="256" cy="256" r="168" fill="url(#halo)"/>

    <!-- faint almanac dial ring -->
    <circle cx="256" cy="256" r="150" fill="none" stroke="rgba(220,180,105,0.22)" stroke-width="1.5"/>
    <circle cx="256" cy="256" r="150" fill="none" stroke="rgba(220,180,105,0.10)" stroke-width="6" filter="url(#blurMed)"/>

    <!-- ===== hero glass star ===== -->
    <!-- cast shadow -->
    <use href="#star" fill="rgba(0,0,0,0.55)" transform="translate(0 18)" filter="url(#blurBig)" opacity=".7"/>
    <!-- outer glow -->
    <use href="#star" fill="rgba(240,200,120,0.5)" filter="url(#blurMed)"/>
    <!-- body -->
    <use href="#star" fill="url(#body)"/>
    <!-- inner core glow -->
    <use href="#star" fill="url(#core)"/>
    <!-- top-left specular highlight, clipped to the star -->
    <g clip-path="url(#starClip)">
      <ellipse cx="196" cy="176" rx="86" ry="52" fill="rgba(255,255,255,0.85)" filter="url(#blurSpec)" transform="rotate(-38 196 176)"/>
      <ellipse cx="212" cy="196" rx="30" ry="16" fill="rgba(255,255,255,0.95)" filter="url(#blurMed)" transform="rotate(-38 212 196)"/>
    </g>
    <!-- rim light -->
    <use href="#star" fill="none" stroke="url(#rim)" stroke-width="2.2"/>

    <!-- secondary sparkle, upper-right -->
    <g opacity=".9">
      <path d="M372 138 Q384 172 418 184 Q384 196 372 230 Q360 196 326 184 Q360 172 372 138 Z"
            fill="url(#body)"/>
      <path d="M372 138 Q384 172 418 184 Q384 196 372 230 Q360 196 326 184 Q360 172 372 138 Z"
            fill="url(#core)"/>
    </g>

    <!-- overall glass sheen + vignette -->
    <rect width="512" height="256" fill="url(#sheen)"/>
    <rect width="512" height="512" fill="url(#vig)"/>
  </svg>
</body>
</html>
